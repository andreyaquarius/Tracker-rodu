# Supabase CLI configuration.
#
# project_id is the (public) project ref — it is already exposed in the client
# bundle and is not a secret.
project_id = "ppiymmsurabwxnzpdasl"

# All Edge Functions require an authenticated user: each one calls
# auth.getUser() in code, and the gateway also rejects unauthenticated requests
# before the function runs. verify_jwt = true is the Supabase default; it is set
# explicitly here so the security expectation is visible and version-controlled
# (audit finding F-16).
[functions.save-ai-key]
verify_jwt = true

[functions.delete-ai-key]
verify_jwt = true

[functions.test-ai-key]
verify_jwt = true

[functions.review-hypothesis]
verify_jwt = true

# Browser CORS preflight requests do not include the user JWT. The function
# still validates authenticated POST requests in code through auth.getUser().
[functions.index-finding-fragment]
verify_jwt = false

[functions.send-project-invitation]
# Browser CORS preflight requests do not include the user JWT. The function
# still validates authenticated POST requests in code through auth.getUser().
verify_jwt = false

[functions.send-announcement-email]
# Browser CORS preflight requests do not include the user JWT. The function
# still validates authenticated POST requests in code through auth.getUser().
verify_jwt = false

[functions.search-places]
verify_jwt = true

[functions.genehelp]
verify_jwt = true

# Public pre-signup guard. It does not read or write private data and exposes no
# secrets; it only blocks restricted email domains / country headers before the
# browser calls Supabase Auth.
[functions.registration-guard]
verify_jwt = false
