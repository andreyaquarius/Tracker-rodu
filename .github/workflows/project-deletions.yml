name: Process project deletions

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: project-deletion-worker
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify project deletion worker secrets
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          CRON_SECRET: ${{ secrets.TASK_REMINDER_CRON_SECRET }}
        run: |
          if [ -z "$PROJECT_REF" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::SUPABASE_PROJECT_REF and TASK_REMINDER_CRON_SECRET are required."
            exit 1
          fi

      - name: Resume queued project deletions
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          CRON_SECRET: ${{ secrets.TASK_REMINDER_CRON_SECRET }}
        run: |
          if ! response="$(curl --fail-with-body --retry 2 --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://${PROJECT_REF}.supabase.co/functions/v1/process-project-deletions")"; then
            echo "::error::Project deletion worker request failed."
            exit 1
          fi

          echo "$response"
          {
            echo "### Project deletion worker"
            echo '```json'
            echo "$response"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
