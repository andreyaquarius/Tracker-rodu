name: Recover abandoned GEDCOM imports

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gedcom-import-rollback-worker
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify GEDCOM rollback worker secrets
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          CRON_SECRET: ${{ secrets.TASK_REMINDER_CRON_SECRET }}
        run: |
          if [ -z "$PROJECT_REF" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::SUPABASE_PROJECT_REF and TASK_REMINDER_CRON_SECRET are required."
            exit 1
          fi

      - name: Resume abandoned GEDCOM rollbacks
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          CRON_SECRET: ${{ secrets.TASK_REMINDER_CRON_SECRET }}
        run: |
          if ! response="$(curl --fail-with-body --retry 2 --max-time 90 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://${PROJECT_REF}.supabase.co/functions/v1/process-gedcom-import-rollbacks")"; then
            echo "::error::GEDCOM import rollback worker request failed."
            exit 1
          fi

          echo "$response"
          {
            echo "### GEDCOM import rollback worker"
            echo '```json'
            echo "$response"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
