name: Deploy Supabase Edge Functions

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      # process-gedcom-exports reuses Edge-safe GEDCOM modules from the app
      # source tree. Changes there must redeploy the function as well.
      - "src/types/**"
      - "src/utils/**"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-edge-functions:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      TASK_REMINDER_CRON_SECRET: ${{ secrets.TASK_REMINDER_CRON_SECRET }}
      GA4_API_SECRET: ${{ secrets.GA4_API_SECRET }}
      GA4_MEASUREMENT_ID: G-SF2725LS4P

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify Supabase deployment configuration
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Repository secret SUPABASE_ACCESS_TOKEN is missing."
            exit 1
          fi
          if [[ "$SUPABASE_ACCESS_TOKEN" != sbp_* ]]; then
            echo "::error::SUPABASE_ACCESS_TOKEN must be a Supabase personal access token (sbp_...), not an sb_secret_ API key or service-role key. Create it at https://supabase.com/dashboard/account/tokens."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Repository secret SUPABASE_PROJECT_REF is missing."
            exit 1
          fi
          if [ -z "$TASK_REMINDER_CRON_SECRET" ]; then
            echo "::error::Repository secret TASK_REMINDER_CRON_SECRET is missing."
            exit 1
          fi
          if [ -z "$GA4_API_SECRET" ]; then
            echo "::error::Repository secret GA4_API_SECRET is missing."
            exit 1
          fi

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify Supabase account and project access
        run: |
          if ! status="$(curl --silent --show-error --retry 2 \
              --output "$RUNNER_TEMP/supabase-project.json" \
              --write-out "%{http_code}" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF")"; then
            echo "::error::Could not connect to the Supabase Management API while verifying deployment credentials."
            exit 1
          fi

          case "$status" in
            200)
              echo "Supabase credentials and project access are valid."
              ;;
            401)
              echo "::error::Supabase rejected SUPABASE_ACCESS_TOKEN (HTTP 401). Replace it with an active personal access token from https://supabase.com/dashboard/account/tokens."
              exit 1
              ;;
            403)
              echo "::error::The Supabase account behind SUPABASE_ACCESS_TOKEN has no access to project $SUPABASE_PROJECT_REF (HTTP 403)."
              exit 1
              ;;
            404)
              echo "::error::SUPABASE_PROJECT_REF does not identify a project accessible to this token (HTTP 404)."
              exit 1
              ;;
            *)
              echo "::error::Could not verify Supabase project access (HTTP $status)."
              exit 1
              ;;
          esac

      - name: Deploy Edge Functions
        run: |
          supabase secrets set \
            TASK_REMINDER_CRON_SECRET="$TASK_REMINDER_CRON_SECRET" \
            GA4_API_SECRET="$GA4_API_SECRET" \
            GA4_MEASUREMENT_ID="$GA4_MEASUREMENT_ID" \
            --project-ref "$SUPABASE_PROJECT_REF"

          for function_dir in supabase/functions/*; do
            if [ ! -d "$function_dir" ]; then
              continue
            fi

            function_name="$(basename "$function_dir")"
            if [[ "$function_name" == _* ]]; then
              continue
            fi

            echo "Deploying $function_name"
            supabase functions deploy "$function_name" --project-ref "$SUPABASE_PROJECT_REF"
          done

      - name: Deliver overdue task reminders after deployment
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          CRON_SECRET: ${{ secrets.TASK_REMINDER_CRON_SECRET }}
        run: |
          if ! response="$(curl --fail-with-body --retry 2 --max-time 55 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "https://${PROJECT_REF}.supabase.co/functions/v1/send-task-reminders")"; then
            echo "::error::The reminder catch-up request failed after deployment."
            exit 1
          fi

          echo "$response"
          {
            echo "### Task reminder catch-up"
            echo '```json'
            echo "$response"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
