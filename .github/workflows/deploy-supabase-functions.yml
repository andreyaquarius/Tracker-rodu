name: Deploy Supabase Edge Functions

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-edge-functions:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify Supabase deployment configuration
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Repository secret SUPABASE_ACCESS_TOKEN is missing."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Repository secret SUPABASE_PROJECT_REF is missing."
            exit 1
          fi

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          for function_dir in supabase/functions/*; do
            if [ ! -d "$function_dir" ]; then
              continue
            fi

            function_name="$(basename "$function_dir")"
            if [[ "$function_name" == _* ]]; then
              continue
            fi

            echo "Deploying $function_name"
            supabase functions deploy "$function_name" --project-ref "$SUPABASE_PROJECT_REF"
          done
